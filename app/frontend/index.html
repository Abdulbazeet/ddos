<!DOCTYPE html>
<html>

<head>
    <title>DDoS Detection System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            width: 50%;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input,
        button {
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .ddos {
            color: red;
            font-weight: bold;
        }

        .normal {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🛡️ DDoS Detection System</h1>

        <form action="/predict" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Upload & Predict</button>
        </form>

        {% if ddos is defined %}

        <div class="result">
            <h2>Results</h2>

            <p class="ddos">🔴 DDoS Attacks: {{ ddos }}</p>
            <p class="normal">🟢 Normal Traffic: {{ normal }}</p>
        </div>

        {% endif %}

    </div>

</body>

</html>
